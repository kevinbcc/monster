
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <meta name="theme-color" content="#FFB7C5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="斬妖帖">
  <link rel="manifest" href="manifest.json">
  <title>櫻花斬妖帖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --sk:#FFB7C5;--sk2:#FF8FAB;--pt:#FFE4EE;--pt2:#FFF0F5;
      --txt:#5C3D4E;--txt2:#9B7088;--txt3:#C4A0B5;
      --card:#FFFAFC;--pu:#C4A0E0;--gr:#7EC8A0;
    }
    html,body{width:100%;height:100%;min-height:100dvh;font-family:'Nunito',sans-serif;background:var(--pt2);color:var(--txt);-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-text-size-adjust:100%;overflow:hidden;position:fixed;}
    .wrap{width:100%;max-width:100%;height:100%;max-height:100dvh;margin:0 auto;background:var(--pt2);position:relative;overflow:auto;-webkit-overflow-scrolling:touch;padding-top:max(0px,env(safe-area-inset-top));padding-bottom:max(0px,env(safe-area-inset-bottom));}
  .petals-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
  .pf{position:absolute;width:9px;height:9px;background:var(--sk);border-radius:50% 0 50% 0;animation:fall linear infinite}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:0.55}100%{transform:translateY(110vh) rotate(400deg);opacity:0}}

  .content{position:relative;z-index:1;padding:clamp(16px,4vw,32px);display:flex;flex-direction:column;align-items:center;gap:clamp(16px,3.5vw,24px)}

  .header{width:100%;display:flex;justify-content:space-between;align-items:center}
  .title{font-size:clamp(18px,5vw,28px);font-weight:900;color:var(--sk2)}
  .title small{display:block;font-size:clamp(12px,3vw,14px);font-weight:700;color:var(--txt3);margin-top:1px}
  .streak{background:var(--pt);border-radius:14px;padding:clamp(4px,1.2vw,8px) clamp(10px,3vw,18px);text-align:center;border:1.5px solid rgba(255,183,197,0.4);flex-shrink:0}
  .streak-n{font-size:clamp(20px,6vw,32px);font-weight:900;color:var(--sk2);line-height:1}
  .streak-l{font-size:clamp(11px,2.5vw,13px);font-weight:700;color:var(--txt3)}

  .monster-box{width:100%;background:var(--card);border-radius:clamp(16px,4vw,24px);border:1.5px solid rgba(255,183,197,0.3);padding:clamp(14px,3.5vw,24px);display:flex;flex-direction:column;align-items:center;gap:clamp(8px,2vw,12px)}
  .hp-row{width:100%;display:flex;justify-content:space-between;font-size:clamp(12px,3vw,15px);font-weight:800;color:var(--txt2)}
  .hp-track{width:100%;height:clamp(10px,2.5vw,16px);background:rgba(255,183,197,0.2);border-radius:20px;border:1.5px solid rgba(255,143,171,0.25);overflow:hidden}
  .hp-fill{height:100%;border-radius:20px;background:var(--sk2);transition:width 0.7s cubic-bezier(.34,1.56,.64,1);position:relative}
  .hp-fill::after{content:'';position:absolute;top:2px;left:6px;right:6px;height:35%;background:rgba(255,255,255,0.45);border-radius:10px}

  .monster-wrap{position:relative;cursor:pointer;user-select:none;width:clamp(140px,40vw,220px);height:clamp(140px,40vw,220px)}
  .monster-wrap:active svg{transform:scale(0.9)}
  svg{transition:transform 0.1s;display:block;width:100%;height:100%}
  .monster-wrap.boing svg{animation:boing 0.4s cubic-bezier(.36,.07,.19,.97)}
  @keyframes boing{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,-3px) rotate(-4deg)}50%{transform:translate(5px,-2px) rotate(3deg)}80%{transform:translate(-3px,2px) rotate(-2deg)}}

  .dmg-pop{position:absolute;top:15%;left:50%;transform:translateX(-50%);font-size:clamp(16px,4.5vw,24px);font-weight:900;color:var(--sk2);pointer-events:none;opacity:0;white-space:nowrap;z-index:10}
  .dmg-pop.go{animation:popfloat 0.7s ease forwards}
  @keyframes popfloat{0%{opacity:1;transform:translateX(-50%) scale(0.7) translateY(0)}50%{opacity:1;transform:translateX(-50%) scale(1.2) translateY(-20px)}100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-44px)}}

  .monster-lbl{font-size:clamp(13px,3vw,15px);font-weight:800;color:var(--txt3)}
  .tap-hint{font-size:clamp(12px,3vw,14px);color:var(--txt3);font-weight:700}

  .checkin-box{width:100%;background:var(--card);border-radius:clamp(16px,4vw,24px);border:1.5px solid rgba(255,183,197,0.3);padding:clamp(16px,4vw,24px);display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2.5vw,16px)}
  .checkin-lbl{font-size:clamp(12px,3vw,14px);font-weight:800;color:var(--txt2)}
  .encourage{width:100%;padding:clamp(10px,2.5vw,16px);background:var(--pt);border-radius:14px;font-size:clamp(13px,3.2vw,15px);font-weight:700;color:var(--txt2);line-height:1.6;text-align:center;border:1px solid rgba(255,183,197,0.25);min-height:50px;display:flex;align-items:center;justify-content:center}
  .checkin-btn{width:100%;padding:clamp(16px,4vw,24px);border-radius:18px;border:none;background:var(--sk2);color:white;font-family:'Nunito',sans-serif;font-size:clamp(17px,4.5vw,22px);font-weight:900;cursor:pointer;transition:all 0.2s}
  .checkin-btn:active{transform:scale(0.97)}
  .checkin-btn.done-state{background:var(--gr);pointer-events:none}

  .calendar-box{width:100%;background:var(--card);border-radius:clamp(16px,4vw,24px);border:1.5px solid rgba(255,183,197,0.3);padding:clamp(14px,3.5vw,20px)}
  .cal-title{font-size:clamp(10px,2.2vw,12px);font-weight:800;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-bottom:clamp(8px,2vw,14px);text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:clamp(4px,1.2vw,8px)}
  .cal-day{aspect-ratio:1;border-radius:clamp(6px,1.5vw,12px);display:flex;align-items:center;justify-content:center;font-size:clamp(10px,2.5vw,13px);font-weight:800;color:var(--txt3);background:rgba(255,183,197,0.1)}
  .cal-day.header-d{font-size:clamp(9px,2vw,11px);font-weight:700;background:transparent;color:var(--txt3)}
  .cal-day.done{background:var(--pt);font-size:0;position:relative}
  .cal-day.done::after{content:'🌸';font-size:clamp(10px,2.8vw,15px);position:absolute}
  .cal-day.today{border:2px solid var(--sk2)}
  .cal-day.future{opacity:0.25}

  .overlay{position:fixed;inset:0;background:rgba(92,61,78,0.55);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.35s;min-height:100dvh;}}
  .overlay.show{opacity:1;pointer-events:all}
  .lv-card{background:var(--card);border-radius:clamp(16px,4vw,24px);padding:clamp(24px,6vw,36px) clamp(20px,5vw,32px);text-align:center;border:2px solid var(--pu);width:min(290px,85%);position:relative}
  .lv-petals{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:inherit}
  .fp2{position:absolute;width:10px;height:10px;border-radius:50% 0 50% 0;animation:fpup 1.4s ease forwards}
  @keyframes fpup{0%{opacity:0.9;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(-110px) rotate(200deg)}}
  .lv-icon{font-size:clamp(36px,9vw,52px);margin-bottom:6px}
  .lv-title{font-size:clamp(18px,5vw,24px);font-weight:900;color:var(--pu);margin-bottom:6px}
  .lv-sub{font-size:clamp(12px,3vw,14px);font-weight:700;color:var(--txt2);margin-bottom:clamp(14px,3.5vw,20px);line-height:1.5}
  .lv-btn{padding:clamp(8px,2vw,12px) clamp(24px,6vw,36px);border-radius:20px;border:none;background:var(--pu);color:white;font-family:'Nunito',sans-serif;font-size:clamp(12px,3vw,14px);font-weight:800;cursor:pointer}

  @media(min-width:480px){
    .monster-wrap{width:clamp(160px,28vw,200px);height:clamp(160px,28vw,200px)}
  }
  </style>
</head>
<body>
<div class="wrap" id="mainWrap">
  <div class="petals-bg" id="petalsArea"></div>
  <div class="content">

    <div class="header">
      <div class="title">櫻花斬妖帖<small id="dateStr">今日的挑戰</small></div>
      <div class="streak"><div class="streak-n" id="streakN">0</div><div class="streak-l">天連勝</div></div>
    </div>

    <div class="monster-box">
      <div class="hp-row"><span id="monsterLbl">Lv.1 焦慮小芽</span><span id="hpTxt">150 / 150</span></div>
      <div class="hp-track"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
      <div class="monster-wrap" id="monsterWrap" onclick="tapMonster()">
        <div class="dmg-pop" id="dmgPop"></div>
        <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="80" cy="118" rx="40" ry="12" fill="rgba(255,183,197,0.18)"/>
          <circle cx="80" cy="92" r="36" fill="#FFD6E4"/>
          <circle cx="80" cy="88" r="30" fill="#FFEBF2"/>
          <ellipse cx="80" cy="96" rx="25" ry="20" fill="#FFD6E4"/>
          <ellipse cx="66" cy="66" rx="11" ry="14" fill="#FFD6E4"/>
          <ellipse cx="94" cy="66" rx="11" ry="14" fill="#FFD6E4"/>
          <ellipse cx="66" cy="63" rx="7" ry="10" fill="#FFEBF2"/>
          <ellipse cx="94" cy="63" rx="7" ry="10" fill="#FFEBF2"/>
          <ellipse cx="64" cy="85" rx="8" ry="6" fill="white"/>
          <ellipse cx="96" cy="85" rx="8" ry="6" fill="white"/>
          <circle cx="65" cy="86" r="4.5" fill="#5C3D4E"/>
          <circle cx="97" cy="86" r="4.5" fill="#5C3D4E"/>
          <circle cx="66.5" cy="84.5" r="1.6" fill="white"/>
          <circle cx="98.5" cy="84.5" r="1.6" fill="white"/>
          <path id="mth" d="M73 98 Q80 104 87 98" stroke="#C4956A" stroke-width="2" fill="none" stroke-linecap="round"/>
          <ellipse cx="57" cy="91" rx="6" ry="4" fill="rgba(255,143,171,0.3)"/>
          <ellipse cx="103" cy="91" rx="6" ry="4" fill="rgba(255,143,171,0.3)"/>
          <ellipse cx="47" cy="102" rx="9" ry="7" fill="#FFD6E4"/>
          <ellipse cx="113" cy="102" rx="9" ry="7" fill="#FFD6E4"/>
          <g id="sweat" opacity="0">
            <ellipse cx="108" cy="64" rx="3.5" ry="5" fill="#B0D8FF"/>
            <ellipse cx="108" cy="59" rx="1.8" ry="2.5" fill="#B0D8FF"/>
          </g>
        </svg>
      </div>
      <div class="monster-lbl">今天的焦慮化身</div>
      <div class="tap-hint">輕點小怪可以攻擊！</div>
    </div>

    <div class="checkin-box">
      <div class="checkin-lbl">今日簽到</div>
      <div class="encourage" id="encourageTxt">點下方按鈕，看看今天的鼓勵！</div>
      <button class="checkin-btn" id="checkinBtn" onclick="doCheckIn()">今天也來打怪！</button>
    </div>

    <div class="calendar-box">
      <div class="cal-title">本月出勤紀錄</div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="lv-card">
      <div class="lv-petals" id="lvPetals"></div>
      <div class="lv-icon">🌸</div>
      <div class="lv-title" id="lvTitle">升級了！</div>
      <div class="lv-sub" id="lvSub">你越來越厲害了！</div>
      <button class="lv-btn" onclick="closeLvup()">繼續加油！</button>
    </div>
  </div>
</div>

<script>
var encouragements = [
  '今天能來，就已經很厲害了 🌸',
  '焦慮只是暫時的，你比它強大 ✨',
  '每一次打卡都是對自己的溫柔 🌷',
  '你不需要完美，只需要今天出現 🌸',
  '小步前進也是前進，為你驕傲 🍀',
  '深呼吸，今天的你已經很棒了 🌸',
  '焦慮打不倒你，因為你每天都在 ✨',
  '允許自己慢慢來，花開有時節 🌷',
  '你比昨天的自己又勇敢一點了 🦋',
  '記得喝水，好好照顧自己 🌸',
  '今天的小努力，就是明天的力量 🌸',
  '不管感覺怎樣，你今天都來了，這就夠了 🌸'
];

var monsters = [
  {name:'Lv.1 焦慮小芽', maxHp:150, tapDmg:4, checkinDmg:40},
  {name:'Lv.2 焦慮小童', maxHp:280, tapDmg:6, checkinDmg:70},
  {name:'Lv.3 焦慮胖嘟', maxHp:450, tapDmg:9, checkinDmg:100},
  {name:'Lv.4 焦慮大叔', maxHp:700, tapDmg:13, checkinDmg:140},
  {name:'Lv.5 焦慮魔王', maxHp:1000, tapDmg:18, checkinDmg:180}
];

var st = {mIdx:0, mHp:150, streak:0};
var checkedDays = [];
var loaded = false;

function todayKey(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function getM(){return monsters[Math.min(st.mIdx,monsters.length-1)];}

function loadData(){
  try{
    var srData = localStorage.getItem('sakura_st');
    if(srData) st = JSON.parse(srData);
  }catch(e){}
  try{
    var drData = localStorage.getItem('sakura_days');
    if(drData) checkedDays = JSON.parse(drData);
  }catch(e){}
  loaded = true;
  updateUI();
  checkCheckinState();
  buildCalendar();
}

function persist(){
  try{ localStorage.setItem('sakura_st', JSON.stringify(st)); }catch(e){}
  try{ localStorage.setItem('sakura_days', JSON.stringify(checkedDays)); }catch(e){}
}

function updateUI(){
  var m=getM();
  var pct=Math.max(0,Math.round(st.mHp/m.maxHp*100));
  document.getElementById('hpFill').style.width=pct+'%';
  document.getElementById('hpTxt').textContent=Math.max(0,st.mHp)+' / '+m.maxHp;
  document.getElementById('monsterLbl').textContent=m.name;
  document.getElementById('streakN').textContent=st.streak;
}

function checkCheckinState(){
  if(checkedDays.indexOf(todayKey())!==-1){
    var btn=document.getElementById('checkinBtn');
    btn.classList.add('done-state');
    btn.textContent='✓  今天已簽到！';
  }
}

function animDmg(n){
  var p=document.getElementById('dmgPop');
  p.textContent='-'+n+' !';
  p.classList.remove('go');
  void p.offsetWidth;
  p.classList.add('go');
}

function shakeMonster(){
  var w=document.getElementById('monsterWrap');
  w.classList.remove('boing'); void w.offsetWidth; w.classList.add('boing');
  setTimeout(function(){w.classList.remove('boing');},450);
  var mth=document.getElementById('mth');
  mth.setAttribute('d','M73 100 Q80 96 87 100');
  setTimeout(function(){mth.setAttribute('d','M73 98 Q80 104 87 98');},600);
  var sw=document.getElementById('sweat');
  sw.setAttribute('opacity','1');
  setTimeout(function(){sw.setAttribute('opacity','0');},900);
}

function dealDamage(dmg){
  st.mHp=Math.max(0,st.mHp-dmg);
  animDmg(dmg); shakeMonster(); updateUI(); persist();
  if(st.mHp<=0){setTimeout(defeatMonster,700);}
}

function tapMonster(){dealDamage(getM().tapDmg); spawnPetals(3);}

function defeatMonster(){
  if(st.mIdx<monsters.length-1){
    st.mIdx++; st.mHp=getM().maxHp; persist(); updateUI(); showLvUp(false);
  }else{
    showLvUp(true);
  }
}

function doCheckIn(){
  var today=todayKey();
  if(checkedDays.indexOf(today)!==-1) return;
  checkedDays.push(today);
  var yest=new Date(); yest.setDate(yest.getDate()-1);
  var yk=yest.getFullYear()+'-'+(yest.getMonth()+1)+'-'+yest.getDate();
  st.streak=checkedDays.indexOf(yk)!==-1 ? st.streak+1 : 1;
  persist();
  var btn=document.getElementById('checkinBtn');
  btn.classList.add('done-state'); btn.textContent='✓  今天已簽到！';
  var msg=encouragements[Math.floor(Math.random()*encouragements.length)];
  document.getElementById('encourageTxt').textContent=msg;
  spawnPetals(14); dealDamage(getM().checkinDmg); buildCalendar();
}

function showLvUp(last){
  document.getElementById('lvTitle').textContent=last?'你打倒焦慮魔王了！':getM().name+' 出現了！';
  document.getElementById('lvSub').textContent=last?'所有焦慮都被你打跑了，你超棒的！🌸':'擊敗上一關！新的挑戰在等你～';
  document.getElementById('overlay').classList.add('show');
  var lp=document.getElementById('lvPetals'); lp.innerHTML='';
  for(var i=0;i<14;i++){
    var p=document.createElement('div'); p.className='fp2';
    p.style.left=(5+Math.random()*90)+'%';
    p.style.bottom=(Math.random()*30)+'px';
    p.style.animationDelay=(Math.random()*0.7)+'s';
    p.style.background=Math.random()>0.5?'#FFB7C5':'#C4A0E0';
    lp.appendChild(p);
  }
}

function closeLvup(){document.getElementById('overlay').classList.remove('show');}

function spawnPetals(n){
  var bg=document.getElementById('petalsArea');
  for(var i=0;i<n;i++){
    var p=document.createElement('div'); p.className='pf';
    p.style.left=(Math.random()*100)+'%';
    p.style.animationDuration=(3+Math.random()*3)+'s';
    p.style.animationDelay=(Math.random()*0.8)+'s';
    p.style.opacity=(0.25+Math.random()*0.4);
    bg.appendChild(p);
    setTimeout((function(el){return function(){if(el.parentNode)el.parentNode.removeChild(el);};})(p),6000);
  }
}

function buildCalendar(){
  var now=new Date(), year=now.getFullYear(), month=now.getMonth(), todayDate=now.getDate();
  var firstDay=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var grid=document.getElementById('calGrid'); grid.innerHTML='';
  ['日','一','二','三','四','五','六'].forEach(function(h){
    var hd=document.createElement('div'); hd.className='cal-day header-d'; hd.textContent=h; grid.appendChild(hd);
  });
  for(var b=0;b<firstDay;b++){var bl=document.createElement('div');bl.className='cal-day';grid.appendChild(bl);}
  for(var d=1;d<=daysInMonth;d++){
    var key=year+'-'+(month+1)+'-'+d;
    var el=document.createElement('div');
    var cls='cal-day';
    if(checkedDays.indexOf(key)!==-1) cls+=' done';
    else if(d===todayDate) cls+=' today';
    else if(d>todayDate) cls+=' future';
    el.className=cls;
    if(checkedDays.indexOf(key)===-1) el.textContent=d;
    grid.appendChild(el);
  }
}

function initDate(){
  var d=new Date(), days=['日','一','二','三','四','五','六'];
  document.getElementById('dateStr').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日（週'+days[d.getDay()]+'）';
}

function initBgPetals(){
  var bg=document.getElementById('petalsArea');
  for(var i=0;i<8;i++){
    var p=document.createElement('div'); p.className='pf';
    p.style.left=(Math.random()*100)+'%';
    p.style.animationDuration=(5+Math.random()*4)+'s';
    p.style.animationDelay=(-Math.random()*8)+'s';
    p.style.opacity=(0.15+Math.random()*0.25);
    bg.appendChild(p);
  }
}

initDate(); initBgPetals(); loadData();
</script>
</body>
</html>
